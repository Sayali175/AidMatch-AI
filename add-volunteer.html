<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Volunteer - AidMatch AI</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="dashboard-container form-page-container">
        <!-- Dashboard Header -->
        <header class="dashboard-header">
            <div class="logo">
                <a href="index.html" class="back-link" aria-label="Back to Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div class="logo-icon-bg">
                    <i class="fa-solid fa-hand-holding-heart icon-logo"></i>
                </div>
                <h1>AidMatch AI</h1>
            </div>
            <div class="header-actions">
                <div class="user-profile">
                    <img src="https://i.pravatar.cc/150?img=47" alt="User Avatar" class="avatar">
                    <div class="user-info">
                        <span class="user-name">Sarah Jenkins</span>
                        <span class="user-role">Administrator</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Form Area -->
        <main class="dashboard-main form-main">
            <div class="form-card">
                <div class="form-header">
                    <h2><i class="fa-solid fa-user-plus text-primary"></i> Register Volunteer</h2>
                    <p>Add a new volunteer to the network.</p>
                </div>

                <form class="custom-form" action="index.html">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <div class="input-with-icon">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="name" name="name" placeholder="e.g., Jane Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="skills">Primary Skill / Role</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-briefcase"></i>
                            <select id="skills" name="skills" required>
                                <option value="" disabled selected>Select a skill area</option>
                                <option value="medical">Medical Assistance</option>
                                <option value="delivery">Logistics & Delivery</option>
                                <option value="teaching">Education & Teaching</option>
                                <option value="driving">Transportation & Driving</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="location">Location</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-location-dot"></i>
                            <input type="text" id="location" name="location" placeholder="Enter neighborhood or address" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="index.html" class="btn btn-outline">Cancel</a>
                        <button type="submit" class="btn btn-primary">Register Volunteer</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
